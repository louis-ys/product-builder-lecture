<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theme Switcher App</title>
  <link href='/style.css' rel='stylesheet'>
  <script>
    // Inline script to prevent theme flickering (FOUC)
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>
<body>
  <header style="position: absolute; top: 20px; right: 20px;">
    <button id="theme-toggle">Loading...</button>
  </header>

  <h1>Theme Switcher</h1>
  <p>Enjoy switching between Light and Dark modes!</p>
  
  <section class="contact-section">
    <h2>Partnership Inquiry</h2>
    <form action="https://formspree.io/f/your-form-id" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" placeholder="Tell us about your proposal" required></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </section>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
